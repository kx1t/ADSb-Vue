# Run on the host that runs Ultrafeeder / tar1090.
#
# host networking = the container reaches Ultrafeeder's tar1090 at 127.0.0.1:80
# and publishes the viewer on the host's :24556 with no port juggling. If you'd
# rather use bridge networking, drop network_mode, add `ports: ["24556:24556"]`,
# and set ADSB_ULTRAFEEDER to the tar1090 host's address (e.g. http://192.168.1.50).
#
# No configuration is needed on the feeder host — the app defaults to
# ADSB_ULTRAFEEDER=http://127.0.0.1 on port 24556. To customize, either add an
# `environment:` block to this service or use a .env file with `env_file:`.
# See the README "Configuration" section and .env.example for all ADSB_* options.

services:
  adsbvue:
    build: .
    image: adsbvue:latest
    container_name: adsbvue
    network_mode: host
    restart: unless-stopped
